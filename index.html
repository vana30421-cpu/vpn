<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>VPN Сервис</h1>
            <div class="balance" id="balance">💰 0₽</div>
        </div>

        <div class="nav" id="nav">
            <button class="nav-btn active" data-page="tariffs">📋 Тарифы</button>
            <button class="nav-btn" data-page="subscription">🔑 Подписка</button>
            <button class="nav-btn" data-page="referral">🎁 Рефералы</button>
        </div>

        <div class="content" id="content">
            <div class="page" id="page-tariffs">
                <h2>📋 Доступные тарифы</h2>
                <div id="tariffs-list">Загрузка...</div>
            </div>
            <div class="page hidden" id="page-subscription">
                <h2>🔑 Моя подписка</h2>
                <div id="subscription-info">Загрузка...</div>
            </div>
            <div class="page hidden" id="page-referral">
                <h2>🎁 Реферальная система</h2>
                <div id="referral-info">Загрузка...</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
